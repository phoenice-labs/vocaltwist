name: VocalTwist CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Minimal permissions — principle of least privilege
permissions:
  contents: read

jobs:
  # ── Backend tests & lint ─────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      # Pin to SHA for supply-chain security; update via Dependabot
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check backend/ VocalTwistTest/

      - name: Run backend unit tests
        run: pytest backend/tests/ -v --tb=short

      - name: Run VocalTwistTest integration tests
        # LM Studio is not available in CI — LLM calls are mocked
        run: pytest VocalTwistTest/tests/ -v --tb=short

  # ── Frontend tests ────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/tests/package-lock.json

      - name: Install frontend test dependencies
        run: |
          if [ -f frontend/tests/package.json ]; then
            cd frontend/tests && npm ci
          fi

      - name: Run frontend tests
        run: |
          if [ -f frontend/tests/package.json ]; then
            cd frontend/tests && npm test -- --passWithNoTests
          else
            echo "No frontend tests found — skipping"
          fi

  # ── Docker build smoke test ───────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: vocaltwist:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
