<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VocalTwist Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <header class="popup-header">
      <span class="popup-logo">🎙 VocalTwist</span>
      <label class="toggle-switch" title="Enable / disable VocalTwist on all sites">
        <input type="checkbox" id="masterToggle" />
        <span class="toggle-track"></span>
      </label>
    </header>

    <!-- Provider status -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusLabel">Checking…</span>
    </div>

    <hr class="divider" />

    <!-- Mode -->
    <section class="section">
      <div class="section-label">Mode</div>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="sttMode" value="push-to-talk" id="modePTT" />
          <span>Push-to-talk</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="sttMode" value="ambient" id="modeAmbient" />
          <span>Ambient <em>(VocalTwist required)</em></span>
        </label>
      </div>
    </section>

    <!-- Language & Voice -->
    <section class="section two-col">
      <div>
        <label class="field-label" for="languageSelect">Language</label>
        <select id="languageSelect" class="select-field">
          <option value="en-US">English</option>
          <option value="hi-IN">Hindi</option>
          <option value="es-ES">Spanish</option>
          <option value="fr-FR">French</option>
          <option value="de-DE">German</option>
          <option value="zh-CN">Chinese</option>
          <option value="ja-JP">Japanese</option>
          <option value="ko-KR">Korean</option>
          <option value="pt-BR">Portuguese (BR)</option>
          <option value="ar-SA">Arabic</option>
          <option value="ru-RU">Russian</option>
          <option value="it-IT">Italian</option>
        </select>
      </div>
      <div>
        <label class="field-label" for="voiceSelect">Voice <em title="Voice affects TTS output only; STT uses the Language setting">(TTS)</em></label>
        <select id="voiceSelect" class="select-field">
          <option value="auto">Auto</option>
        </select>
      </div>
    </section>

    <hr class="divider" />

    <!-- Checkboxes -->
    <section class="section">
      <label class="checkbox-option">
        <input type="checkbox" id="ttsEnabled" />
        <span>Auto-read AI responses</span>
      </label>
      <label class="checkbox-option">
        <input type="checkbox" id="showMicButton" />
        <span>Show mic button on text fields</span>
      </label>
      <label class="checkbox-option">
        <input type="checkbox" id="disableOnSite" />
        <span>Disable on this site</span>
      </label>
    </section>

    <hr class="divider" />

    <!-- Advanced (collapsible) -->
    <details class="advanced-section">
      <summary class="advanced-toggle">Advanced ▸</summary>

      <div class="advanced-body">
        <div class="field-group">
          <label class="field-label" for="backendUrl">Backend URL</label>
          <input type="url" id="backendUrl" class="text-field" placeholder="http://localhost:8000" />
        </div>

        <div class="field-group">
          <label class="field-label" for="apiKey">API Key <em>(optional)</em></label>
          <input type="password" id="apiKey" class="text-field" placeholder="Leave blank if not set" />
        </div>

        <div class="field-group">
          <label class="field-label" for="ttsSpeed">TTS Speed: <span id="ttsSpeedVal">1.0×</span></label>
          <input type="range" id="ttsSpeed" min="0.5" max="2.0" step="0.1" value="1.0" class="range-field" />
        </div>

        <div class="field-group">
          <label class="field-label" for="customSelector">Custom CSS selector for this site</label>
          <input type="text" id="customSelector" class="text-field" placeholder=".ai-response-container" />
        </div>

        <button id="testConnection" class="btn-secondary">Test connection</button>
        <span id="testResult" class="test-result"></span>
      </div>
    </details>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="shortcut-hint">Shortcut: <kbd>Ctrl+Shift+V</kbd></span>
      <button id="saveBtn" class="btn-primary">Save</button>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
